spring:
  application:
    name: gato-client
  profiles:
    active: dev
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/db_gato_client}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Admin123}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8081}

client:
  id: ${CLIENT_ID:gato-client-1}
  secret: ${CLIENT_SECRET:secret123}
  base-url: ${CLIENT_BASE_URL:http://localhost:8081}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
